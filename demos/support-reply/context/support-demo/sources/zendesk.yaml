slug: zendesk
name: Zendesk (demo fixture)
description: |
  5,000 inbound support tickets from a JSONL dump. Same shape a real
  Zendesk CSV export or API pull would produce. The connector reads
  each line as one document; if a row carries an `embedding` field,
  IngestionService skips chunking + OpenAI and stores the vector
  directly (this is the cached-embeddings path — run
  `node scripts/embed-tickets.mjs` once to populate, then commit).

  When real Zendesk OAuth ships, swap `kind: file-import` for
  `kind: zendesk` with live credentials; the rest of the pipeline
  (chunk → embed → knowledge_chunk → retrieval) is unchanged.
kind: file-import
config:
  path: ./data/tickets.jsonl
  format: jsonl
enabled: true
