slug: customer
label: Customer
description: A customer account — the entity that owns one or more tickets. Loosely populated for the demo (real CRM integration is L4).
icon: user
schema:
  fields:
    name:
      type: string
      required: true
    email:
      type: string
      required: true
    plan_tier:
      type: enum
      values: [free, starter, growth, enterprise]
      default: free
    lifetime_value_usd:
      type: number
      description: Cumulative spend across all subscriptions
    account_age_days:
      type: number
      description: Days since signup
    is_repeat_complainer:
      type: boolean
      description: Heuristic flag — true when the same customer has filed 3+ tickets in the last 30 days
      default: false
sourceRelevance:
  zendesk: 0.6
  crm: 1.0
classificationPrompt: |
  Identify whether a tenant communication describes a Customer entity.
  Look for: an email address, a plan tier mention, a contract or
  account-id reference, or a billing-history allusion. Don't classify
  generic mailing-list subscribers or one-off prospects as Customers.
